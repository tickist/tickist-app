name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Lint, test, and build
      # This placeholder job will grow once hosting/environment steps are defined.
        run: npx nx run-many -t lint test build

      - name: Analyze and suggest fixes
        run: npx nx fix-ci
        if: always()
