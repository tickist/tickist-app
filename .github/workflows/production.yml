name: Production Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_REMOTE_DB_URL: ${{ secrets.SUPABASE_REMOTE_DB_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NG_APP_SUPABASE_URL: ${{ secrets.NG_APP_SUPABASE_URL }}
      NG_APP_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NG_APP_SUPABASE_PUBLISHABLE_KEY }}
      NG_APP_SUPABASE_FUNCTIONS_URL: ${{ secrets.NG_APP_SUPABASE_FUNCTIONS_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify app
        run: |
          npx nx lint tickist-web
          npx nx test tickist-web
          npx nx build tickist-web --configuration production

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push production DB migrations
        run: supabase db push --db-url "$SUPABASE_REMOTE_DB_URL"

      - name: Deploy Edge Functions
        run: |
          for fn in task-reminder project-update routine-runner; do
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
          done

      - name: Build Cloudflare Worker assets
        run: npm run build:worker

      - name: Deploy Cloudflare Worker
        run: npm run deploy:worker

      - name: Sync Cloudflare Worker Secrets
        run: |
          for key in NG_APP_SUPABASE_URL NG_APP_SUPABASE_PUBLISHABLE_KEY NG_APP_SUPABASE_FUNCTIONS_URL; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              exit 1
            fi
          done

          secrets_file="$(mktemp)"
          jq -n \
            --arg supabaseUrl "$NG_APP_SUPABASE_URL" \
            --arg publishableKey "$NG_APP_SUPABASE_PUBLISHABLE_KEY" \
            --arg functionsUrl "$NG_APP_SUPABASE_FUNCTIONS_URL" \
            '{
              NG_APP_SUPABASE_URL: $supabaseUrl,
              NG_APP_SUPABASE_PUBLISHABLE_KEY: $publishableKey,
              NG_APP_SUPABASE_FUNCTIONS_URL: $functionsUrl
            }' > "$secrets_file"

          npx --yes wrangler@4 secret bulk "$secrets_file" --config wrangler.toml
          rm -f "$secrets_file"
