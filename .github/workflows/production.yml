name: Production Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_REMOTE_DB_URL: ${{ secrets.SUPABASE_REMOTE_DB_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      INTERNAL_FUNCTION_SECRET: ${{ secrets.INTERNAL_FUNCTION_SECRET }}
      ROUTINE_RUNNER_SECRET: ${{ secrets.ROUTINE_RUNNER_SECRET }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      SES_CONFIGURATION_SET: ${{ secrets.SES_CONFIGURATION_SET }}
      EMAIL_RATE_LIMIT_PER_MINUTE: ${{ secrets.EMAIL_RATE_LIMIT_PER_MINUTE }}
      EMAIL_RATE_LIMIT_PER_HOUR: ${{ secrets.EMAIL_RATE_LIMIT_PER_HOUR }}
      EMAIL_RATE_LIMIT_PER_DAY: ${{ secrets.EMAIL_RATE_LIMIT_PER_DAY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NG_APP_SUPABASE_URL: ${{ secrets.NG_APP_SUPABASE_URL }}
      NG_APP_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NG_APP_SUPABASE_PUBLISHABLE_KEY }}
      NG_APP_SUPABASE_FUNCTIONS_URL: ${{ secrets.NG_APP_SUPABASE_FUNCTIONS_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify app
        run: |
          npx nx lint tickist-web
          npx nx test tickist-web
          npx nx build tickist-web --configuration production

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push production DB migrations
        run: supabase db push --db-url "$SUPABASE_REMOTE_DB_URL"

      - name: Sync Supabase Edge Function secrets
        run: |
          supabase_secret_key="${SUPABASE_SECRET_KEY:-${SUPABASE_SERVICE_ROLE_KEY:-}}"
          supabase_publishable_key="${SUPABASE_PUBLISHABLE_KEY:-${SUPABASE_ANON_KEY:-${NG_APP_SUPABASE_PUBLISHABLE_KEY:-}}}"
          internal_function_secret="${INTERNAL_FUNCTION_SECRET:-${ROUTINE_RUNNER_SECRET:-}}"

          if [ -z "$supabase_secret_key" ]; then
            echo "::error::Missing required GitHub secret: SUPABASE_SECRET_KEY"
            echo "::notice::Temporary fallback is SUPABASE_SERVICE_ROLE_KEY."
            exit 1
          fi

          if [ -z "$supabase_publishable_key" ]; then
            echo "::error::Missing required GitHub secret: SUPABASE_PUBLISHABLE_KEY"
            echo "::notice::Temporary fallback is SUPABASE_ANON_KEY or existing NG_APP_SUPABASE_PUBLISHABLE_KEY."
            exit 1
          fi

          if [ -z "$internal_function_secret" ]; then
            echo "::error::Missing required GitHub secret: INTERNAL_FUNCTION_SECRET"
            echo "::notice::Temporary fallback is ROUTINE_RUNNER_SECRET."
            exit 1
          fi

          for key in EMAIL_FROM AWS_REGION AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              exit 1
            fi
          done

          rate_limit_minute="${EMAIL_RATE_LIMIT_PER_MINUTE:-1}"
          rate_limit_hour="${EMAIL_RATE_LIMIT_PER_HOUR:-60}"
          rate_limit_day="${EMAIL_RATE_LIMIT_PER_DAY:-500}"

          secret_args=(
            "SUPABASE_SECRET_KEY=${supabase_secret_key}"
            "SUPABASE_PUBLISHABLE_KEY=${supabase_publishable_key}"
            "INTERNAL_FUNCTION_SECRET=${internal_function_secret}"
            "SUPABASE_SERVICE_ROLE_KEY=${supabase_secret_key}"
            "SUPABASE_ANON_KEY=${supabase_publishable_key}"
            "ROUTINE_RUNNER_SECRET=${internal_function_secret}"
            "EMAIL_FROM=${EMAIL_FROM}"
            "AWS_REGION=${AWS_REGION}"
            "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}"
            "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}"
            "EMAIL_RATE_LIMIT_PER_MINUTE=${rate_limit_minute}"
            "EMAIL_RATE_LIMIT_PER_HOUR=${rate_limit_hour}"
            "EMAIL_RATE_LIMIT_PER_DAY=${rate_limit_day}"
          )

          if [ -n "${AWS_SESSION_TOKEN:-}" ]; then
            secret_args+=("AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}")
          fi

          if [ -n "${SES_CONFIGURATION_SET:-}" ]; then
            secret_args+=("SES_CONFIGURATION_SET=${SES_CONFIGURATION_SET}")
          fi

          supabase secrets set "${secret_args[@]}" --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy Edge Functions
        run: |
          for fn in task-reminder project-update routine-runner notification-digest-runner enqueue-notification send-emails tickist-mcp; do
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
          done

      - name: Build Cloudflare Worker assets
        run: npm run build:worker

      - name: Deploy Cloudflare Worker
        run: npm run deploy:worker

      - name: Sync Cloudflare Worker Secrets
        run: |
          for key in NG_APP_SUPABASE_URL NG_APP_SUPABASE_PUBLISHABLE_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              exit 1
            fi
          done

          if [ -z "$NG_APP_SUPABASE_FUNCTIONS_URL" ]; then
            functions_url="${NG_APP_SUPABASE_URL%/}/functions/v1"
            echo "::notice::NG_APP_SUPABASE_FUNCTIONS_URL not provided; deriving from NG_APP_SUPABASE_URL."
          else
            functions_url="$NG_APP_SUPABASE_FUNCTIONS_URL"
          fi

          secrets_file="$(mktemp)"
          jq -n \
            --arg supabaseUrl "$NG_APP_SUPABASE_URL" \
            --arg publishableKey "$NG_APP_SUPABASE_PUBLISHABLE_KEY" \
            --arg functionsUrl "$functions_url" \
            '{
              NG_APP_SUPABASE_URL: $supabaseUrl,
              NG_APP_SUPABASE_PUBLISHABLE_KEY: $publishableKey,
              NG_APP_SUPABASE_FUNCTIONS_URL: $functionsUrl
            }' > "$secrets_file"

          npx --yes wrangler@4 secret bulk "$secrets_file" --config wrangler.toml
          rm -f "$secrets_file"
