name: Production Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_REMOTE_DB_URL: ${{ secrets.SUPABASE_REMOTE_DB_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      INTERNAL_FUNCTION_SECRET: ${{ secrets.INTERNAL_FUNCTION_SECRET }}
      ROUTINE_RUNNER_SECRET: ${{ secrets.ROUTINE_RUNNER_SECRET }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      SES_CONFIGURATION_SET: ${{ secrets.SES_CONFIGURATION_SET }}
      EMAIL_RATE_LIMIT_PER_MINUTE: ${{ secrets.EMAIL_RATE_LIMIT_PER_MINUTE }}
      EMAIL_RATE_LIMIT_PER_HOUR: ${{ secrets.EMAIL_RATE_LIMIT_PER_HOUR }}
      EMAIL_RATE_LIMIT_PER_DAY: ${{ secrets.EMAIL_RATE_LIMIT_PER_DAY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NG_APP_SUPABASE_URL: ${{ secrets.NG_APP_SUPABASE_URL }}
      NG_APP_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NG_APP_SUPABASE_PUBLISHABLE_KEY }}
      NG_APP_SUPABASE_FUNCTIONS_URL: ${{ secrets.NG_APP_SUPABASE_FUNCTIONS_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify app
        run: |
          npx nx lint tickist-web
          npx nx test tickist-web
          npx nx build tickist-web --configuration production

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      - name: Prepare Supabase psql connection
        run: |
          node <<'NODE'
          const { appendFileSync } = require('node:fs');

          const value = process.env.SUPABASE_REMOTE_DB_URL || '';
          if (!value.trim()) {
            console.log('::error::Missing required GitHub secret: SUPABASE_REMOTE_DB_URL');
            process.exit(1);
          }

          let parsed;
          try {
            parsed = new URL(value);
          } catch {
            console.log('::error::SUPABASE_REMOTE_DB_URL must be a PostgreSQL connection URI.');
            console.log('::notice::Expected format: postgresql://USER:PASSWORD@HOST:PORT/postgres?sslmode=require');
            process.exit(1);
          }

          const validProtocol = parsed.protocol === 'postgresql:' || parsed.protocol === 'postgres:';
          const errors = [];
          if (!validProtocol) {
            errors.push('protocol must be postgresql:// or postgres://');
          }
          if (!parsed.username) {
            errors.push('username is missing');
          }
          if (!parsed.hostname || parsed.hostname.startsWith('@')) {
            errors.push('host is missing or starts with @');
          }
          if (!parsed.pathname || parsed.pathname === '/') {
            errors.push('database name is missing');
          }

          if (errors.length) {
            console.log(`::error::Invalid SUPABASE_REMOTE_DB_URL: ${errors.join(', ')}.`);
            console.log('::notice::If the database password contains special characters like @, :, /, ?, #, %, encode them in the URL before saving the GitHub secret.');
            console.log('::notice::Expected Supabase format: postgresql://postgres.<project-ref>:<url-encoded-password>@aws-...pooler.supabase.com:6543/postgres?sslmode=require');
            process.exit(1);
          }

          if (!parsed.searchParams.has('sslmode')) {
            console.log('::notice::SUPABASE_REMOTE_DB_URL has no sslmode query parameter; psql will use sslmode=require.');
          }

          const decodeUrlPart = (label, rawValue) => {
            try {
              return decodeURIComponent(rawValue);
            } catch {
              console.log(`::error::SUPABASE_REMOTE_DB_URL has invalid percent-encoding in ${label}.`);
              console.log('::notice::Encode special characters in the database URL before saving the GitHub secret.');
              process.exit(1);
            }
          };
          const keywordValue = (key, rawValue) => {
            const escaped = rawValue.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
            return `${key}='${escaped}'`;
          };
          const database = decodeUrlPart('database name', parsed.pathname.replace(/^\//, ''));
          const port = parsed.port || '5432';
          const sslmode = parsed.searchParams.get('sslmode') || 'require';
          const connection = [
            keywordValue('host', parsed.hostname),
            keywordValue('port', port),
            keywordValue('dbname', database),
            keywordValue('user', decodeUrlPart('username', parsed.username)),
            keywordValue('password', decodeUrlPart('password', parsed.password)),
            keywordValue('sslmode', sslmode),
          ].join(' ');

          appendFileSync(process.env.GITHUB_ENV, `SUPABASE_PSQL_DB_URL=${connection}\n`);
          console.log(`SUPABASE_REMOTE_DB_URL parsed for host ${parsed.hostname}.`);
          NODE

      - name: Sync scheduler Vault secrets
        run: |
          internal_function_secret="${INTERNAL_FUNCTION_SECRET:-${ROUTINE_RUNNER_SECRET:-}}"

          if [ -z "$internal_function_secret" ]; then
            echo "::error::Missing required GitHub secret: INTERNAL_FUNCTION_SECRET"
            echo "::notice::Temporary fallback is ROUTINE_RUNNER_SECRET."
            exit 1
          fi

          if [ -z "$NG_APP_SUPABASE_FUNCTIONS_URL" ]; then
            if [ -z "$NG_APP_SUPABASE_URL" ]; then
              echo "::error::Missing required GitHub secret: NG_APP_SUPABASE_URL"
              exit 1
            fi
            functions_url="${NG_APP_SUPABASE_URL%/}/functions/v1"
            echo "::notice::NG_APP_SUPABASE_FUNCTIONS_URL not provided; deriving from NG_APP_SUPABASE_URL."
          else
            functions_url="$NG_APP_SUPABASE_FUNCTIONS_URL"
          fi
          functions_url="${functions_url%/}"

          psql "$SUPABASE_PSQL_DB_URL" \
            -v ON_ERROR_STOP=1 \
            -v functions_base_url="$functions_url" \
            -v internal_function_secret="$internal_function_secret" <<'SQL'
          create extension if not exists supabase_vault with schema vault;

          create temporary table tickist_scheduler_vault_secret_sync (
            name text primary key,
            value text not null,
            description text not null
          ) on commit drop;

          insert into tickist_scheduler_vault_secret_sync (name, value, description)
          values
            (
              'tickist_functions_base_url',
              :'functions_base_url',
              'Base URL for Tickist scheduled Supabase Edge Function calls.'
            ),
            (
              'tickist_internal_function_secret',
              :'internal_function_secret',
              'Internal header secret used by Tickist scheduled Supabase Edge Function calls.'
            );

          do $$
          declare
            item record;
            existing_id uuid;
          begin
            for item in
              select name, value, description
              from tickist_scheduler_vault_secret_sync
            loop
              select id
                into existing_id
              from vault.decrypted_secrets
              where name = item.name
              limit 1;

              if existing_id is null then
                perform vault.create_secret(item.value, item.name, item.description);
              else
                perform vault.update_secret(
                  existing_id,
                  item.value,
                  item.name,
                  item.description
                );
              end if;
            end loop;
          end;
          $$;
          SQL

      - name: Push production DB migrations
        run: supabase db push --db-url "$SUPABASE_REMOTE_DB_URL"

      - name: Sync Supabase Edge Function secrets
        run: |
          supabase_secret_key="${SUPABASE_SECRET_KEY:-${SUPABASE_SERVICE_ROLE_KEY:-}}"
          supabase_publishable_key="${SUPABASE_PUBLISHABLE_KEY:-${SUPABASE_ANON_KEY:-${NG_APP_SUPABASE_PUBLISHABLE_KEY:-}}}"
          internal_function_secret="${INTERNAL_FUNCTION_SECRET:-${ROUTINE_RUNNER_SECRET:-}}"

          if [ -z "$supabase_secret_key" ]; then
            echo "::error::Missing required GitHub secret: SUPABASE_SECRET_KEY"
            echo "::notice::Temporary fallback is SUPABASE_SERVICE_ROLE_KEY."
            exit 1
          fi

          if [ -z "$supabase_publishable_key" ]; then
            echo "::error::Missing required GitHub secret: SUPABASE_PUBLISHABLE_KEY"
            echo "::notice::Temporary fallback is SUPABASE_ANON_KEY or existing NG_APP_SUPABASE_PUBLISHABLE_KEY."
            exit 1
          fi

          if [ -z "$internal_function_secret" ]; then
            echo "::error::Missing required GitHub secret: INTERNAL_FUNCTION_SECRET"
            echo "::notice::Temporary fallback is ROUTINE_RUNNER_SECRET."
            exit 1
          fi

          for key in EMAIL_FROM AWS_REGION AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              exit 1
            fi
          done

          rate_limit_minute="${EMAIL_RATE_LIMIT_PER_MINUTE:-1}"
          rate_limit_hour="${EMAIL_RATE_LIMIT_PER_HOUR:-60}"
          rate_limit_day="${EMAIL_RATE_LIMIT_PER_DAY:-500}"

          secret_args=(
            "SUPABASE_SECRET_KEY=${supabase_secret_key}"
            "SUPABASE_PUBLISHABLE_KEY=${supabase_publishable_key}"
            "INTERNAL_FUNCTION_SECRET=${internal_function_secret}"
            "SUPABASE_SERVICE_ROLE_KEY=${supabase_secret_key}"
            "SUPABASE_ANON_KEY=${supabase_publishable_key}"
            "ROUTINE_RUNNER_SECRET=${internal_function_secret}"
            "EMAIL_FROM=${EMAIL_FROM}"
            "AWS_REGION=${AWS_REGION}"
            "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}"
            "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}"
            "EMAIL_RATE_LIMIT_PER_MINUTE=${rate_limit_minute}"
            "EMAIL_RATE_LIMIT_PER_HOUR=${rate_limit_hour}"
            "EMAIL_RATE_LIMIT_PER_DAY=${rate_limit_day}"
          )

          if [ -n "${AWS_SESSION_TOKEN:-}" ]; then
            secret_args+=("AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}")
          fi

          if [ -n "${SES_CONFIGURATION_SET:-}" ]; then
            secret_args+=("SES_CONFIGURATION_SET=${SES_CONFIGURATION_SET}")
          fi

          supabase secrets set "${secret_args[@]}" --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy Edge Functions
        run: |
          for fn in task-reminder project-update routine-runner notification-digest-runner enqueue-notification send-emails tickist-mcp; do
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
          done

      - name: Write production runtime env
        run: |
          for key in NG_APP_SUPABASE_URL NG_APP_SUPABASE_PUBLISHABLE_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              exit 1
            fi
          done

          if [ -z "$NG_APP_SUPABASE_FUNCTIONS_URL" ]; then
            functions_url="${NG_APP_SUPABASE_URL%/}/functions/v1"
            echo "::notice::NG_APP_SUPABASE_FUNCTIONS_URL not provided; deriving from NG_APP_SUPABASE_URL."
          else
            functions_url="$NG_APP_SUPABASE_FUNCTIONS_URL"
          fi

          env_payload="$(jq -cn \
            --arg supabaseUrl "$NG_APP_SUPABASE_URL" \
            --arg publishableKey "$NG_APP_SUPABASE_PUBLISHABLE_KEY" \
            --arg functionsUrl "$functions_url" \
            '{
              NG_APP_SUPABASE_URL: $supabaseUrl,
              NG_APP_SUPABASE_PUBLISHABLE_KEY: $publishableKey,
              NG_APP_SUPABASE_ANON_KEY: $publishableKey,
              NG_APP_SUPABASE_FUNCTIONS_URL: $functionsUrl
            }')"

          printf 'globalThis.__env = %s;\n' "$env_payload" > apps/tickist-web/public/env.js

      - name: Build Cloudflare Worker assets
        run: npm run build:worker

      - name: Deploy Cloudflare Worker
        run: npm run deploy:worker

      - name: Sync Cloudflare Worker Secrets
        run: |
          if [ -z "$NG_APP_SUPABASE_FUNCTIONS_URL" ]; then
            functions_url="${NG_APP_SUPABASE_URL%/}/functions/v1"
            echo "::notice::NG_APP_SUPABASE_FUNCTIONS_URL not provided; deriving from NG_APP_SUPABASE_URL."
          else
            functions_url="$NG_APP_SUPABASE_FUNCTIONS_URL"
          fi

          secrets_file="$(mktemp)"
          jq -n \
            --arg supabaseUrl "$NG_APP_SUPABASE_URL" \
            --arg publishableKey "$NG_APP_SUPABASE_PUBLISHABLE_KEY" \
            --arg functionsUrl "$functions_url" \
            '{
              NG_APP_SUPABASE_URL: $supabaseUrl,
              NG_APP_SUPABASE_PUBLISHABLE_KEY: $publishableKey,
              NG_APP_SUPABASE_FUNCTIONS_URL: $functionsUrl
            }' > "$secrets_file"

          npx --yes wrangler@4 secret bulk "$secrets_file" --config wrangler.toml
          rm -f "$secrets_file"

      - name: Verify Cloudflare runtime env
        run: |
          runtime_env="$(curl -fsS https://tickist.com/env.js)"

          if echo "$runtime_env" | grep -q 'globalThis.__env = globalThis.__env || {}'; then
            echo "::error::Cloudflare runtime env is still serving the static placeholder."
            exit 1
          fi

          if ! echo "$runtime_env" | grep -Eq '"NG_APP_SUPABASE_URL"[[:space:]]*:[[:space:]]*"https://'; then
            echo "::error::Cloudflare runtime env is missing NG_APP_SUPABASE_URL."
            exit 1
          fi

          if ! echo "$runtime_env" | grep -Eq '"NG_APP_SUPABASE_PUBLISHABLE_KEY"[[:space:]]*:[[:space:]]*"[^"]+"'; then
            echo "::error::Cloudflare runtime env is missing NG_APP_SUPABASE_PUBLISHABLE_KEY."
            exit 1
          fi
