name: Production Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_REMOTE_DB_URL: ${{ secrets.SUPABASE_REMOTE_DB_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify app
        run: |
          npx nx lint tickist-web
          npx nx test tickist-web
          npx nx build tickist-web --configuration production

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push production DB migrations
        run: supabase db push --db-url "$SUPABASE_REMOTE_DB_URL"

      - name: Deploy Edge Functions
        run: |
          for fn in task-reminder project-update routine-runner; do
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
          done

      - name: Build Cloudflare Worker assets
        run: npm run build:worker

      - name: Deploy Cloudflare Worker
        run: npm run deploy:worker
