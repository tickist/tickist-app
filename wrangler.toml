name = "tickist-app"
main = "apps/tickist-web/worker.ts"
compatibility_date = "2026-02-01"
workers_dev = false

[[routes]]
pattern = "tickist.com/*"
zone_name = "tickist.com"

[assets]
directory = "dist/tickist-web"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "single-page-application"
