<button
  type="button"
  class="theme-toggle-btn theme-toggle-btn--floating"
  data-testid="theme-toggle"
  [attr.aria-label]="themeButtonLabel()"
  [attr.aria-pressed]="!isDarkTheme()"
  [attr.title]="themeButtonLabel()"
  (click)="toggleTheme()"
  >
  <span class="theme-toggle-btn__icon" aria-hidden="true">
    {{ isDarkTheme() ? '☀️' : '🌙' }}
  </span>
</button>
<section class="mx-auto flex w-full max-w-md flex-col gap-6 rounded-3xl border border-white/10 bg-base-200/60 p-8 shadow-2xl shadow-black/30 backdrop-blur">
  <header class="space-y-2 text-center">
    <p class="text-xs font-semibold uppercase tracking-[0.4em] text-base-content/60">
      Update password
    </p>
    <h1 class="text-2xl font-semibold text-base-content">
      Set a new password
    </h1>
    <p class="text-sm text-base-content/70">
      Choose a new password for your account. Use at least 6 characters.
    </p>
  </header>

  @if (recoveryIssue(); as issue) {
    <p class="rounded-xl border border-error/30 bg-error/10 px-4 py-3 text-sm text-error">
      {{ issue }} Request a new <a routerLink="/auth/reset" class="link link-error">reset link</a>.
    </p>
  }

  <form class="flex flex-col gap-6" [formGroup]="form" (ngSubmit)="handleSubmit()">
    <label class="form-control w-full">
      <span class="label">
        <span class="label-text text-base-content/70">New password</span>
      </span>
      <input
        formControlName="password"
        type="password"
        class="input input-bordered w-full auth-input"
        placeholder="••••••••"
        autocomplete="new-password"
        />
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <span class="label-text-alt text-error">
          Min. 6 characters
        </span>
      }
    </label>

    <label class="form-control w-full">
      <span class="label">
        <span class="label-text text-base-content/70">Confirm password</span>
      </span>
      <input
        formControlName="confirmPassword"
        type="password"
        class="input input-bordered w-full auth-input"
        placeholder="••••••••"
        autocomplete="new-password"
        />
      @if (passwordsMismatch) {
        <span class="label-text-alt text-error">
          Passwords must match
        </span>
      }
    </label>

    <button class="btn btn-primary auth-update-submit" type="submit" [disabled]="isDisabled">
      @if (!isSubmitting()) {
        <span>Update password</span>
      }
      @if (isSubmitting()) {
        <span class="loading loading-spinner"></span>
      }
      @if (isSubmitting()) {
        <span>Updating...</span>
      }
    </button>
  </form>

  @if (message(); as feedback) {
    <p class="text-sm text-base-content/70" [ngClass]="{ 'text-success': feedback.type === 'success', 'text-error': feedback.type === 'error' }">
      {{ feedback.text }}
    </p>
  }

  <footer class="text-center text-xs text-base-content/60">
    Remember your password? <a routerLink="/auth" class="link link-primary">Sign in</a>
  </footer>
</section>
