<button
  type="button"
  class="theme-toggle-btn theme-toggle-btn--floating"
  data-testid="theme-toggle"
  [attr.aria-label]="themeButtonLabel()"
  [attr.aria-pressed]="!isDarkTheme()"
  [attr.title]="themeButtonLabel()"
  (click)="toggleTheme()"
>
  <span class="theme-toggle-btn__icon" aria-hidden="true">
    {{ isDarkTheme() ? '☀️' : '🌙' }}
  </span>
</button>
<section
  class="mx-auto flex w-full max-w-md flex-col gap-6 rounded-3xl border border-white/10 bg-base-200/60 p-8 shadow-2xl shadow-black/30 backdrop-blur"
>
  <header class="space-y-2 text-center">
    <p
      class="text-xs font-semibold uppercase tracking-[0.4em] text-base-content/60"
    >
      Sign up
    </p>
    <h1 class="text-2xl font-semibold text-base-content">
      Create your Tickist account
    </h1>
    <p class="text-sm text-base-content/70">
      Accounts are powered by Supabase Auth. Use the same email you plan to use
      inside the app.
    </p>
  </header>

  <form
    class="flex flex-col gap-6"
    [formGroup]="form"
    (ngSubmit)="handleSubmit()"
  >
    <label class="form-control w-full">
      <span class="label">
        <span class="label-text text-base-content/70">Email</span>
      </span>
      <input
        formControlName="email"
        type="email"
        class="input input-bordered w-full auth-input"
        placeholder="team@tickist.app"
      />
    </label>
    <label class="form-control w-full">
      <span class="label">
        <span class="label-text text-base-content/70">Password</span>
      </span>
      <input
        formControlName="password"
        type="password"
        class="input input-bordered w-full auth-input"
        placeholder="••••••••"
      />
    </label>
    <label class="form-control w-full">
      <span class="label">
        <span class="label-text text-base-content/70">Confirm password</span>
      </span>
      <input
        formControlName="confirm"
        type="password"
        class="input input-bordered w-full auth-input"
        placeholder="••••••••"
      />
    </label>
    <button
      class="btn btn-primary text-primary-content"
      type="submit"
      [disabled]="isDisabled"
    >
      @if (!isSubmitting()) {
      <span>Create account</span>
      } @if (isSubmitting()) {
      <span class="loading loading-spinner"></span>
      } @if (isSubmitting()) {
      <span>Submitting…</span>
      }
    </button>
  </form>

  @if (message(); as feedback) {
  <p
    class="text-sm text-base-content/70"
    [ngClass]="{
      'text-success': feedback.type === 'success',
      'text-error': feedback.type === 'error'
    }"
  >
    {{ feedback.text }}
  </p>
  }

  <footer class="text-center text-xs text-base-content/60">
    Already have an account?
    <a routerLink="/auth" class="link link-primary">Sign in</a>
  </footer>
</section>
