<div
  class="fab-wrapper"
  (mouseenter)="hovered.set(true)"
  (mouseleave)="hovered.set(false)"
>
  <button
    type="button"
    class="fab-mini"
    *ngIf="hovered()"
    (click)="showProjectModal()"
  >
    +
  </button>
  <button type="button" class="fab-main" (click)="showTaskModal()">
    +
  </button>
</div>

<div class="fab-overlay" *ngIf="taskModalOpen()" (click)="closeTaskModal()">
  <div class="fab-modal" (click)="$event.stopPropagation()">
    <app-task-composer
      [preset]="taskPreset()"
      (dismiss)="closeTaskModal()"
      (created)="closeTaskModal()"
    ></app-task-composer>
  </div>
</div>

<div class="fab-overlay" *ngIf="projectModalOpen()" (click)="closeProjectModal()">
  <div class="fab-modal" (click)="$event.stopPropagation()">
    <app-project-composer
      [preset]="projectPreset()"
      (dismiss)="closeProjectModal()"
      (created)="closeProjectModal()"
    ></app-project-composer>
  </div>
</div>
