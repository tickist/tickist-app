<article class="task-card" [class.simple]="viewMode === 'simple'" [class.completed]="task.isDone">
  <div class="task-card__row">
    <label class="task-card__check">
      <input
        type="checkbox"
        [checked]="task.isDone"
        (click)="$event.preventDefault(); toggleDone(!task.isDone)"
        [style.borderColor]="priorityColor(task.priority)"
        [style.boxShadow]="'0 0 0 1px ' + priorityColor(task.priority)"
      />
    </label>
    <div class="task-card__title">
      <span
        *ngIf="taskTypeLabel() as taskTypeBadgeLabel"
        class="task-card__task-type"
        [class.task-card__task-type--next-action]="isNextActionTask()"
        [class.task-card__task-type--need-info]="isNeedInfoTask()"
      >
        {{ taskTypeBadgeLabel }}
      </span>
      <p class="linkified" [innerHTML]="task.name | linkify"></p>
      <span class="task-card__time" *ngIf="taskTimeLabel() as summary">({{ summary }})</span>
    </div>
    <div class="task-card__actions">
      <button type="button" class="icon-btn" [class.active]="task.pinned" title="Pin task" (click)="togglePin()">
        📌
      </button>
      <button type="button" class="icon-btn" title="Edit task" (click)="editTask()">✏️</button>
      <div class="task-card__menu">
        <button type="button" class="icon-btn" title="More actions" (click)="menuOpen.set(!menuOpen())">⋮</button>
        <div class="task-menu" *ngIf="menuOpen()">
          <div class="menu__section">
            <p>Priority</p>
            <button
              type="button"
              *ngFor="let level of ['A','B','C']"
              [class.active]="task.priority?.toUpperCase() === level"
              (click)="setPriority(level)"
            >
              {{ level }}
            </button>
          </div>
          <div class="menu__section">
            <p>Task type</p>
            <button
              type="button"
              [class.active]="task.taskType?.toLowerCase() === 'normal'"
              (click)="setTaskType('normal')"
            >
              ▢ Normal
            </button>
            <button
              type="button"
              [class.active]="task.taskType?.toLowerCase() === 'next_action'"
              (click)="setTaskType('next_action')"
            >
              ⚡ Next action
            </button>
            <button
              type="button"
              [class.active]="task.taskType?.toLowerCase() === 'need_info'"
              (click)="setTaskType('need_info')"
            >
              🛈 Need info
            </button>
          </div>
          <div class="menu__section">
            <p>Schedule</p>
            <button type="button" (click)="setDueToday()">Do it today</button>
            <button type="button" (click)="shiftDue(1)">+1 day</button>
            <button type="button" (click)="shiftDue(7)">+1 week</button>
            <button type="button" (click)="clearDue()">Clear date</button>
          </div>
          <button type="button" class="menu__danger" (click)="deleteTask()">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <div class="task-card__date" *ngIf="finishDateLabel() as finishDateLabel">
    <span class="task-card__date-icon">{{ finishDateModeIcon() }}</span>
    <span>{{ finishDateLabel }}</span>
  </div>

  <div class="task-card__progress" *ngIf="viewMode === 'extended' && progressPercent() as percent">
    <div class="progress">
      <div class="progress__fill" [style.width.%]="percent"></div>
    </div>
  </div>

  <div class="task-card__toolbar" *ngIf="viewMode === 'extended'">
    <button
      type="button"
      class="toolbar-btn toolbar-btn--persistent active"
      title="Change project"
      (click)="toggleProjectPicker()"
    >
      📁
    </button>
    <button
      type="button"
      class="toolbar-btn"
      data-testid="task-toolbar-description"
      [class.configured]="hasDescription()"
      [class.active]="descriptionOpen()"
      [attr.title]="descriptionStatusLabel()"
      [attr.aria-label]="descriptionStatusLabel()"
      (click)="toggleDescription()"
    >
      💬
    </button>
    <button
      type="button"
      class="toolbar-btn"
      data-testid="task-toolbar-tags"
      [class.configured]="hasTags()"
      [class.active]="tagsOpen()"
      [attr.title]="tagsStatusLabel()"
      [attr.aria-label]="tagsStatusLabel()"
      (click)="toggleTags()"
    >
      🏷️
    </button>
    <button
      type="button"
      class="toolbar-btn"
      data-testid="task-toolbar-repeat"
      [class.configured]="hasRepeat()"
      [class.active]="repeatOpen()"
      [attr.title]="repeatStatusLabel()"
      [attr.aria-label]="repeatStatusLabel()"
      (click)="toggleRepeat()"
    >
      🔁
    </button>
    <button
      type="button"
      class="toolbar-btn"
      data-testid="task-toolbar-steps"
      [class.configured]="hasSteps()"
      [class.active]="stepsOpen()"
      [attr.title]="stepsStatusLabel()"
      [attr.aria-label]="stepsStatusLabel()"
      (click)="toggleSteps()"
    >
      ☑️
    </button>
  </div>

  <section class="task-card__panel" *ngIf="projectPickerOpen()">
    <label class="panel-field">
      <span class="panel-label">Project</span>
      <select [value]="task.projectId || ''" (change)="changeProject($any($event.target).value)">
        <option value="">Inbox</option>
        <option *ngFor="let option of projects()" [value]="option.id">
          {{ option.name }}
        </option>
      </select>
    </label>
  </section>

  <section class="task-card__panel task-card__panel--description" *ngIf="descriptionOpen()">
    <div class="description-header">
      <p class="panel-label">Description</p>
      <button
        *ngIf="!descriptionEditing()"
        type="button"
        class="description-edit-btn"
        (click)="beginDescriptionEdit()"
      >
        {{ hasDescription() ? 'Edit' : 'Add' }}
      </button>
    </div>

    <div
      class="description-content task-description linkified"
      *ngIf="!descriptionEditing() && hasDescription(); else descriptionEditState"
      [innerHTML]="task.description | linkify"
    ></div>

    <ng-template #descriptionEditState>
      <ng-container *ngIf="descriptionEditing(); else descriptionEmpty">
        <label class="panel-field">
          <textarea
            rows="4"
            placeholder="Add context, links, or notes..."
            [value]="descriptionDraft()"
            (input)="descriptionDraft.set($any($event.target).value)"
          ></textarea>
        </label>
        <div class="panel-actions description-actions">
          <button class="description-btn description-btn--ghost" type="button" (click)="cancelDescriptionEdit()">
            Cancel
          </button>
          <button class="description-btn description-btn--primary" type="button" (click)="saveDescription()">
            Save
          </button>
        </div>
      </ng-container>
    </ng-template>

    <ng-template #descriptionEmpty>
      <p class="description-empty">No description yet.</p>
    </ng-template>
  </section>

  <section class="task-card__panel" *ngIf="tagsOpen()">
    <div class="tag-chips" *ngIf="task.tags.length; else noTags">
      <span class="chip" *ngFor="let tagId of task.tags">
        {{ tagName(tagId) }}
        <button type="button" (click)="removeTag(tagId)">×</button>
      </span>
    </div>
    <ng-template #noTags>
      <p class="panel-hint">No tags yet.</p>
    </ng-template>
    <div class="tag-add" *ngIf="availableTagsToAdd().length">
      <select (change)="addTagFromSelect($any($event.target))">
        <option value="">Add tag…</option>
        <option *ngFor="let option of availableTagsToAdd()" [value]="option.id">
          {{ option.name }}
        </option>
      </select>
    </div>
  </section>

  <section class="task-card__panel" *ngIf="repeatOpen()">
    <p class="panel-label">Repeat</p>
    <div class="repeat-grid">
      <button
        type="button"
        *ngFor="let option of repeatOptions"
        [class.active]="isRepeatOptionActive(option.mode)"
        (click)="setRepeatInterval(option.mode)"
      >
        {{ option.label }}
      </button>
    </div>
    <div class="repeat-custom" *ngIf="isCustomRepeatEditorVisible()">
      <p class="panel-label panel-label--inline">Every</p>
      <div class="repeat-custom__controls">
        <input
          type="number"
          min="1"
          class="repeat-custom__input"
          [value]="customRepeatEvery()"
          (input)="setCustomRepeatEvery($any($event.target).value)"
        />
        <select
          class="repeat-custom__select"
          [value]="customRepeatUnit()"
          (change)="setCustomRepeatUnit($any($event.target).value)"
        >
          <option value="day">days</option>
          <option value="week">weeks</option>
          <option value="month">months</option>
          <option value="year">years</option>
        </select>
        <button type="button" class="repeat-custom__apply" (click)="applyCustomRepeat()">
          Apply
        </button>
      </div>
    </div>
    <div class="repeat-from" *ngIf="currentRepeatMode() !== 'never'">
      <p class="panel-label panel-label--inline">
        From
        <span
          class="repeat-from__info"
          role="note"
          tabindex="0"
          [attr.title]="repeatFromHelpText"
          [attr.aria-label]="repeatFromHelpText"
        >
          i
        </span>
      </p>
      <div class="repeat-from__options">
        <button
          type="button"
          [class.active]="currentRepeatFromMode() === 'completion_date'"
          (click)="setRepeatFrom('completion_date')"
        >
          completion date
        </button>
        <button
          type="button"
          [class.active]="currentRepeatFromMode() === 'due_date'"
          (click)="setRepeatFrom('due_date')"
        >
          due date
        </button>
      </div>
      <p class="panel-hint" *ngIf="!canRepeatFromDueDate()">
        No due date set. Repeat uses completion date by default.
      </p>
    </div>
  </section>

  <section class="task-card__panel" *ngIf="stepsOpen()">
    <div class="step-list" *ngIf="task.steps.length; else noSteps">
      <div class="step-item" *ngFor="let step of task.steps; index as i">
        <label class="step-check">
          <input type="checkbox" [checked]="step.isDone" (change)="toggleStep(step, $any($event.target).checked)" />
        </label>
        <span
          class="step-title linkified"
          [class.line-through]="step.isDone"
          [innerHTML]="step.content | linkify"
        ></span>
        <div class="step-controls">
          <button type="button" (click)="moveStep(step, 'up')" [disabled]="i === 0">↑</button>
          <button type="button" (click)="moveStep(step, 'down')" [disabled]="i === task.steps.length - 1">↓</button>
          <button type="button" class="step-remove" aria-label="Remove step" (click)="removeStep(step)">
            ✕
          </button>
        </div>
      </div>
    </div>
    <ng-template #noSteps>
      <p class="panel-hint">No steps yet.</p>
    </ng-template>
    <div class="step-add">
      <input type="text" placeholder="Add step" [value]="newStepDraft()" (input)="newStepDraft.set($any($event.target).value)" />
      <button type="button" (click)="addStep()">Add</button>
    </div>
  </section>
</article>
